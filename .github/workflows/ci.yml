# ============================================================
# PIPELINE DE INTEGRACIÓN CONTINUA - SITAC VEN
# ============================================================
# Este pipeline se ejecuta automáticamente cuando:
# - Se abre un Pull Request hacia main
# - Se hace push a la rama main (opcional)
# ============================================================

name: CI - Integración Continua

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  validate-code:
    runs-on: ubuntu-latest
    
    steps:
      # ===== PASO 1: DESCARGAR EL CÓDIGO =====
      - name: 📥 Descargar código del repositorio
        uses: actions/checkout@v3
      
      # ===== PASO 2: INSTALAR DEPENDENCIAS =====
      - name: 📦 Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: 📦 Instalar dependencias
        run: npm install
        continue-on-error: false
      
      # ===== PASO 3: VERIFICACIÓN DEL CÓDIGO =====
      - name: 🔍 Verificar sintaxis de JavaScript
        run: |
          echo "🔍 Verificando archivos JavaScript..."
          find . -name "*.js" -not -path "./node_modules/*" -exec node -c {} \; || echo "❌ Error en algún archivo JS"
        continue-on-error: true
        
      - name: 🔍 Verificar sintaxis de HTML
        run: |
          echo "🔍 Verificando archivos HTML..."
          find . -name "*.html" -not -path "./node_modules/*" -exec echo "✅ OK: {}" \;
        continue-on-error: true
        
      - name: 🔍 Verificar sintaxis de CSS
        run: |
          echo "🔍 Verificando archivos CSS..."
          find . -name "*.css" -not -path "./node_modules/*" -exec echo "✅ OK: {}" \;
        continue-on-error: true
      
      # ===== PASO 4: VALIDAR ESTRUCTURA DE ARCHIVOS =====
      - name: 📁 Validar estructura del proyecto
        run: |
          echo "📁 Validando archivos requeridos..."
          
          # Verificar que index.html existe
          if [ -f "index.html" ]; then
            echo "✅ index.html encontrado"
          else
            echo "❌ ERROR: No se encuentra index.html"
            exit 1
          fi
          
          # Verificar que script.js existe
          if [ -f "script.js" ]; then
            echo "✅ script.js encontrado"
          else
            echo "❌ ERROR: No se encuentra script.js"
            exit 1
          fi
          
          # Verificar que style.css existe
          if [ -f "style.css" ]; then
            echo "✅ style.css encontrado"
          else
            echo "❌ ERROR: No se encuentra style.css"
            exit 1
          fi
          
          # Verificar que config.example.js existe
          if [ -f "config.example.js" ]; then
            echo "✅ config.example.js encontrado"
          else
            echo "⚠️ ADVERTENCIA: No se encuentra config.example.js"
          fi
          
          # Verificar que CONTRIBUTING.md existe
          if [ -f "CONTRIBUTING.md" ]; then
            echo "✅ CONTRIBUTING.md encontrado"
          else
            echo "⚠️ ADVERTENCIA: No se encuentra CONTRIBUTING.md"
          fi
          
          # Verificar que CHANGELOG.md existe
          if [ -f "CHANGELOG.md" ]; then
            echo "✅ CHANGELOG.md encontrado"
          else
            echo "⚠️ ADVERTENCIA: No se encuentra CHANGELOG.md"
          fi
          
          # Verificar que README.md existe
          if [ -f "README.md" ]; then
            echo "✅ README.md encontrado"
          else
            echo "❌ ERROR: No se encuentra README.md"
            exit 1
          fi
          
          echo "✅ Validación de estructura completada"
      
      # ===== PASO 5: RESUMEN FINAL =====
      - name: ✅ Resumen del pipeline
        run: |
          echo "=========================================="
          echo "  🚀 PIPELINE DE CI COMPLETADO"
          echo "=========================================="
          echo "✅ Código descargado"
          echo "✅ Dependencias instaladas"
          echo "✅ Verificación de sintaxis completada"
          echo "✅ Estructura del proyecto validada"
          echo "=========================================="
          echo "📌 Estado: LISTO PARA REVISIÓN"