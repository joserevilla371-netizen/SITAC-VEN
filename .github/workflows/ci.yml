name: CI - Integración Continua

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v3
      
      - name: 📦 Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: 📦 Instalar dependencias
        run: npm install
      
      - name: 🧪 Ejecutar pruebas
        run: npm test || echo "⚠️ Pruebas fallaron, continuando..."
      
      - name: 🔍 Verificar sintaxis
        run: |
          echo "🔍 Verificando archivos JavaScript..."
          find . -name "*.js" -not -path "./node_modules/*" -exec node -c {} \; || echo "⚠️ Errores de sintaxis"
      
      - name: 📁 Validar estructura
        run: |
          echo "📁 Validando archivos..."
          [ -f "index.html" ] && echo "✅ index.html"
          [ -f "script.js" ] && echo "✅ script.js"
          [ -f "style.css" ] && echo "✅ style.css"